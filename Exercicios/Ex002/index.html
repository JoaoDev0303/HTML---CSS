<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraphs</title>
</head>
<body>
    <h1>Paragraphs and line break </h1>
    <p>You can write
        a paragraph anyway.
        Enough put everthing
        in the middle of the pair of tags.
        &lt;p&gt; and &lt;/p&gt; </p> <!--less than / Greather than-->
    <p>If need break
        text at a specific point
        <br> like this,
        you can use a &lt;br&gt; tag
        </p>
        <p>Let's add some special symbols:
            &reg;
            &copy;
            &trade;
            &euro;
            &pound;
            &yen;
            &cent;
            &Delta;
            &uarr;
        </p>
        <p>Let's add some emojis:
            &#x1F92A
            &#x1F595
        </p>
</body>
</html>
